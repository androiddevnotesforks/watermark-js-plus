name: "🐛 Bug report / 缺陷反馈"
description: Report a reproducible problem / 报告可复现的问题
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Usage questions and integration help belong in [GitHub Discussions](https://github.com/zhensherlock/watermark-js-plus/discussions).

        感谢反馈缺陷。使用问题和集成帮助请前往 [GitHub Discussions](https://github.com/zhensherlock/watermark-js-plus/discussions)。

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites / 提交前检查
      options:
        - label: I searched existing issues and discussions for the same problem. / 我已搜索现有 Issue 和 Discussions。
          required: true
        - label: I can reproduce the problem in a public minimal example without private data. / 我可以在不含私密数据的公开最小示例中复现问题。
          required: true

  - type: input
    id: package-version
    attributes:
      label: watermark-js-plus version / 版本
      placeholder: e.g. 1.6.6
    validations:
      required: true

  - type: dropdown
    id: watermark-type
    attributes:
      label: Watermark type / 水印类型
      options:
        - Watermark — page / 页面水印
        - Watermark — container / 容器水印
        - ImageWatermark / 图片水印
        - BlindWatermark — create / 创建暗水印
        - BlindWatermark.decode — reveal / 显现暗水印
        - IE compatibility entry / IE 兼容入口
        - Other / 其他
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser and version / 浏览器及版本
      placeholder: e.g. Chrome 140, Safari 18.5, IE 11
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system and version / 操作系统及版本
      placeholder: e.g. macOS 15.5, Windows 11, iOS 18.5
    validations:
      required: true

  - type: input
    id: build-tool
    attributes:
      label: Build tool and version / 构建工具及版本
      description: Write "CDN / no bundler" when applicable. / 如果没有构建工具，请填写“CDN / no bundler”。
      placeholder: e.g. Vite 7.0, Webpack 5, Next.js 15, CDN / no bundler
    validations:
      required: true

  - type: input
    id: import-entry
    attributes:
      label: Import entry / 引入入口
      placeholder: e.g. watermark-js-plus, watermark-js-plus/es, watermark-js-plus/ie, CDN IIFE
    validations:
      required: true

  - type: input
    id: framework
    attributes:
      label: Framework, if any / 前端框架（可选）
      description: Framework versions are useful context but are not required for framework-agnostic reproductions. / 框架版本仅作为补充信息。
      placeholder: e.g. React 19, Vue 3.5, vanilla JavaScript

  - type: input
    id: minimal-reproduction
    attributes:
      label: Minimal reproduction URL / 最小复现地址
      description: Link a small GitHub repository, StackBlitz, CodeSandbox, or similar public demo. / 请提供精简的公开仓库或在线演示。
      placeholder: https://github.com/... or https://stackblitz.com/...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce / 复现步骤
      placeholder: |
        1. Open the reproduction
        2. Run ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior / 预期行为
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual behavior / 实际行为
      description: Include complete errors or console output when relevant. / 如有错误或控制台输出，请完整粘贴。
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context / 其他信息
      description: Add screenshots, recordings, or configuration that may help diagnose the problem. / 可补充截图、录屏或相关配置。
