<svg
  xmlns="http://www.w3.org/2000/svg"
  xmlns:xlink="http://www.w3.org/1999/xlink"
  width="1280"
  height="640"
  viewBox="0 0 1280 640"
>
  <defs>
    <linearGradient id="leftShade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#02071f" stop-opacity="0.98" />
      <stop offset="0.44" stop-color="#02071f" stop-opacity="0.78" />
      <stop offset="0.68" stop-color="#02071f" stop-opacity="0.05" />
      <stop offset="1" stop-color="#02071f" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="chipStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#75ddff" stop-opacity="0.72" />
      <stop offset="1" stop-color="#6958ff" stop-opacity="0.36" />
    </linearGradient>
    <filter id="logoGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="9" result="blur" />
      <feColorMatrix
        in="blur"
        type="matrix"
        values="0 0 0 0 0.09 0 0 0 0 0.47 0 0 0 0 1 0 0 0 0.55 0"
      />
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <image
    x="0"
    y="0"
    width="1280"
    height="640"
    preserveAspectRatio="xMidYMid slice"
    xlink:href="social-preview-background.png"
  />
  <rect width="1280" height="640" fill="url(#leftShade)" />

  <g filter="url(#logoGlow)">
    <image
      x="78"
      y="64"
      width="62"
      height="60"
      preserveAspectRatio="xMidYMid meet"
      xlink:href="../../docs/public/logo.png"
    />
  </g>

  <text
    x="160"
    y="101"
    fill="#8fafff"
    font-family="SF Pro Display, SF Pro Text, Helvetica Neue, Arial, sans-serif"
    font-size="16"
    font-weight="700"
    letter-spacing="3.1"
  >BROWSER WATERMARK LIBRARY</text>

  <text
    x="78"
    y="205"
    fill="#ffffff"
    font-family="SF Pro Display, SF Pro Text, Helvetica Neue, Arial, sans-serif"
    font-size="58"
    font-weight="750"
    letter-spacing="-2.2"
  >watermark-js-plus</text>

  <text
    x="80"
    y="278"
    fill="#e6edff"
    font-family="SF Pro Display, SF Pro Text, Helvetica Neue, Arial, sans-serif"
    font-size="34"
    font-weight="620"
    letter-spacing="-0.8"
  >Browser watermarks</text>
  <text
    x="80"
    y="321"
    fill="#a9bce7"
    font-family="SF Pro Display, SF Pro Text, Helvetica Neue, Arial, sans-serif"
    font-size="34"
    font-weight="500"
    letter-spacing="-0.8"
  >for any framework</text>

  <g font-family="SF Pro Text, Helvetica Neue, Arial, sans-serif" font-size="18" font-weight="650">
    <rect x="80" y="378" width="108" height="43" rx="21.5" fill="#102957" fill-opacity="0.68" stroke="url(#chipStroke)" />
    <text x="134" y="406" fill="#eaf5ff" text-anchor="middle">Visible</text>

    <rect x="202" y="378" width="102" height="43" rx="21.5" fill="#102957" fill-opacity="0.68" stroke="url(#chipStroke)" />
    <text x="253" y="406" fill="#eaf5ff" text-anchor="middle">Image</text>

    <rect x="318" y="378" width="96" height="43" rx="21.5" fill="#102957" fill-opacity="0.68" stroke="url(#chipStroke)" />
    <text x="366" y="406" fill="#eaf5ff" text-anchor="middle">Blind</text>
  </g>

  <line x1="80" y1="480" x2="126" y2="480" stroke="#39d5ff" stroke-width="3" stroke-linecap="round" />
  <text
    x="144"
    y="487"
    fill="#91a9d6"
    font-family="SF Pro Text, Helvetica Neue, Arial, sans-serif"
    font-size="19"
    font-weight="520"
    letter-spacing="0.2"
  >TypeScript · Framework agnostic</text>

  <text
    x="80"
    y="566"
    fill="#6278aa"
    font-family="SF Mono, SFMono-Regular, Menlo, monospace"
    font-size="16"
    font-weight="500"
    letter-spacing="0.5"
  >npm install watermark-js-plus</text>
</svg>
